<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yunanca Akıllı Okuyucu v12.0 - Ultimate Edition</title>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --border: #252a38;
    --accent: #4f8ef7;
    --accent-hover: #3b76db;
    --accent2: #e8c96d;
    --text: #e8eaf0;
    --text-dim: #8b90a0;
    --success: #4ade80;
    --error: #f87171;
    --shadow: 0 4px 15px rgba(0,0,0,0.4);
    --transition: all 0.3s ease;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
    padding: 20px; 
    line-height: 1.6; 
    padding-bottom: 150px;
    min-height: 100vh;
    font-size: 15px; /* Temel yazı boyutu normale çekildi */
  }

  .container { max-width: 1000px; margin: 0 auto; }

  /* === HEADER VE SEKMELER === */
  header { 
    margin-bottom: 20px; 
    border-bottom: 1px solid var(--border); 
    padding-bottom: 20px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
  }

  .logo h1 { font-size: 1.6rem; color: var(--accent); letter-spacing: -0.5px; }
  .logo span { color: var(--accent2); }
  .logo p { color: var(--text-dim); font-size: 0.9rem; margin-top: 5px; }

  .main-tabs { display: flex; gap: 10px; }
  .main-tab-btn {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    transition: var(--transition);
  }
  .main-tab-btn:hover { border-color: var(--accent); color: var(--text); }
  .main-tab-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    box-shadow: 0 4px 15px rgba(79, 142, 247, 0.3);
  }

  /* === VERİ SENKRONİZASYON PANELİ (YENİ) === */
  .data-sync-panel {
    background: #0f1219;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 15px 20px;
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
  }
  .sync-info strong { color: var(--accent2); font-size: 1rem; display: block; margin-bottom: 3px; }
  .sync-info p { font-size: 0.85rem; color: var(--text-dim); }
  .sync-buttons { display: flex; gap: 10px; }
  .sync-btn { padding: 10px 15px; font-size: 0.9rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.2s; border: none; }
  .sync-btn-down { background: var(--accent); color: white; }
  .sync-btn-down:hover { background: var(--accent-hover); }
  .sync-btn-up { background: var(--border); color: white; display: flex; align-items: center; }
  .sync-btn-up:hover { background: #32384a; }

  /* === GİRİŞ PANELLERİ (METİN, URL, PDF) === */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 15px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: var(--shadow);
  }

  .input-tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; flex-wrap: wrap; }
  .sub-tab-btn {
    background: transparent;
    color: var(--text-dim);
    border: none;
    padding: 8px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    transition: var(--transition);
  }
  .sub-tab-btn.active { background: var(--border); color: var(--accent); }
  .sub-tab-btn:hover:not(.active) { background: rgba(255,255,255,0.05); }

  .input-panel { display: none; animation: fadeIn 0.4s ease; }
  .input-panel.active { display: block; }

  textarea { 
    width: 100%; 
    height: 150px; 
    background: #090b10; 
    border: 1px solid var(--border); 
    color: var(--text); 
    padding: 15px; 
    border-radius: 10px; 
    font-size: 1rem; 
    margin-bottom: 15px; 
    resize: vertical; 
    outline: none;
    transition: var(--transition);
  }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79, 142, 247, 0.1); }

  .url-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
  .url-row input { 
    flex: 1; 
    min-width: 200px;
    background: #090b10; 
    border: 1px solid var(--border); 
    color: var(--text); 
    padding: 12px 15px; 
    border-radius: 8px; 
    font-size: 0.95rem; 
    outline: none;
  }
  .url-row input:focus { border-color: var(--accent); }

  .pdf-label {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 40px 20px; border: 2px dashed var(--border); border-radius: 10px;
    cursor: pointer; color: var(--text-dim); font-size: 1rem; margin-bottom: 15px;
    transition: var(--transition);
    background: rgba(0,0,0,0.2);
  }
  .pdf-label:hover { border-color: var(--accent); color: var(--text); background: rgba(79, 142, 247, 0.05); }
  #pdf-input { display: none; }
  #pdf-status { color: var(--accent2); font-size: 0.9rem; margin-bottom: 10px; font-weight: bold; text-align: center; }

  /* === BUTONLAR === */
  .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .main-btn { 
    background: var(--accent); 
    color: white; 
    border: none; 
    padding: 12px 25px; 
    border-radius: 8px; 
    cursor: pointer; 
    font-weight: bold; 
    font-size: 0.95rem;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .main-btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(79, 142, 247, 0.3); }
  .main-btn:active { transform: translateY(0); }
  
  .secondary-btn { background: var(--border); color: var(--text); border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: var(--transition); }
  .secondary-btn:hover { background: #32384a; }

  /* === OKUYUCU (READER) ALANI === */
  #reader { 
    background: var(--surface); 
    padding: 25px; 
    border-radius: 15px; 
    border: 1px solid var(--border); 
    display: none; 
    font-size: 1.15rem; /* Normale çekildi */
    margin-top: 25px; 
    position: relative;
    line-height: 1.8;
    box-shadow: var(--shadow);
  }
  .tok { cursor: pointer; display: inline; padding: 1px 3px; border-radius: 4px; transition: var(--transition); border-bottom: 1px solid transparent; }
  .tok:hover { background: rgba(79, 142, 247, 0.2); color: var(--accent); border-bottom-color: var(--accent); }
  .tok.highlighted { background: rgba(232, 201, 109, 0.3); color: #fff; border-bottom-color: var(--accent2); }

  /* === DESTE LİSTESİ (AKORDİYON) === */
  #deck-display { margin-top: 30px; }
  .deck-section { margin-bottom: 12px; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
  .deck-header { background: #1c212d; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; transition: var(--transition); }
  .deck-header:hover { background: #242a3a; }
  .deck-header strong { font-size: 1.05rem; color: var(--accent); }
  .deck-arrow { font-size: 0.9rem; color: var(--text-dim); transition: transform 0.3s; }
  .deck-arrow.open { transform: rotate(180deg); }
  .deck-content { padding: 12px 20px; display: none; background: #0f1219; }
  .deck-content.open { display: block; animation: fadeIn 0.3s ease; }
  .word-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: center; font-size: 1rem; }
  .word-item:last-child { border-bottom: none; }
  .word-item span b { color: var(--accent2); margin-right: 8px; font-size: 1.05rem; }
  .del-btn { color: var(--error); cursor: pointer; background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.3); font-size: 0.9rem; padding: 4px 10px; border-radius: 6px; transition: var(--transition); }
  .del-btn:hover { background: var(--error); color: #000; }

  /* === GELİŞMİŞ TEST ÜNİTESİ === */
  #quiz-section-container { display: none; animation: fadeIn 0.4s ease; }
  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 15px;
    padding: 30px 20px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .quiz-controls-top { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
  .quiz-controls-top select {
    padding: 10px 15px;
    background: #000;
    color: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.95rem;
    min-width: 180px;
    cursor: pointer;
    outline: none;
  }
  .quiz-controls-top select:focus { border-color: var(--accent); }
  
  #quiz-work-area { min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  .quiz-big-word { font-size: 2.5rem; color: var(--accent2); font-weight: 800; margin-bottom: 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); } /* Küçültüldü */
  
  /* Çoktan Seçmeli Grid */
  .quiz-options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px; margin: 0 auto; }
  .quiz-opt-btn {
    background: #090b10;
    color: white;
    border: 1px solid var(--border);
    padding: 15px;
    border-radius: 10px;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }
  .quiz-opt-btn:hover { border-color: var(--accent); background: rgba(79, 142, 247, 0.1); transform: translateY(-2px); }
  
  /* Yazma Testi Input */
  #quiz-write-input {
    width: 100%; max-width: 400px; padding: 15px; background: #000; color: white;
    border: 2px solid var(--border); border-radius: 10px; text-align: center;
    font-size: 1.2rem; margin-bottom: 20px; outline: none; transition: 0.3s;
  }
  #quiz-write-input:focus { border-color: var(--accent); }

  #quiz-feedback { margin-top: 20px; font-size: 1.3rem; font-weight: bold; min-height: 30px; }

  /* === POPUP (KELİME KARTI) === */
  #wpop { 
    position: fixed;
    background: #151923; 
    border: 1px solid var(--accent); 
    padding: 20px; 
    border-radius: 15px; 
    display: none; 
    z-index: 9999; 
    width: min(400px, 95vw);
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    left: 50%;
    transform: translateX(-50%);
    bottom: 20px;
    animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes slideUp { from { transform: translate(-50%, 100px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  
  .wpop-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
  #wp-gr { font-size: 1.4rem; font-weight: 800; color: var(--accent2); word-break: break-word; line-height: 1.2; } /* Küçültüldü */
  .close-pop-btn { background: none; border: none; color: var(--error); font-size: 1.5rem; cursor: pointer; transition: 0.2s; line-height: 1; }
  .close-pop-btn:hover { transform: scale(1.1); }

  #wp-mean-input { 
    width: 100%; background: #000; border: 1px solid var(--border); color: #fff; 
    padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 1rem; text-align: center; outline: none;
    transition: 0.3s;
  }
  #wp-mean-input:focus { border-color: var(--accent); }
  
  #wp-context-box {
    background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; border-left: 3px solid var(--accent);
    color: var(--text-dim); font-style: italic; font-size: 0.9rem; margin-bottom: 15px; line-height: 1.4;
  }

  .deck-tools { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .deck-tools-row { display: flex; justify-content: space-between; align-items: center; }
  .deck-tools-row label { color: var(--text-dim); font-size: 0.85rem; }
  .deck-tools-row button { background: none; border: none; color: var(--accent); cursor: pointer; font-weight: bold; font-size: 0.85rem; }
  .deck-tools select { width: 100%; padding: 10px; background: #000; color: white; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; outline: none; }

  .action-buttons { display: flex; gap: 8px; }
  .action-btn-primary { flex: 2; background: var(--accent); border: none; padding: 12px; border-radius: 8px; color: white; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: 0.2s; }
  .action-btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .action-btn-success { flex: 1; background: var(--success); border: none; padding: 12px; border-radius: 8px; color: white; font-size: 1.2rem; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center;}
  .action-btn-success:hover { background: #22c55e; transform: translateY(-1px); }
  .action-btn-secondary { background: var(--border); border: none; padding: 12px; border-radius: 8px; color: white; font-size: 1rem; cursor: pointer; transition: 0.2s; }
  .action-btn-secondary:hover { background: #32384a; }

  /* === TOAST BİLDİRİMLERİ === */
  #toast { 
    position: fixed; top: 20px; right: 20px; 
    background: var(--accent2); color: #000; 
    padding: 12px 25px; border-radius: 10px; 
    display: none; z-index: 10000; font-weight: 700; font-size: 0.95rem;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    animation: slideInRight 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* Responsive Tasarım Ayarları */
  @media (max-width: 768px) {
    .quiz-options-grid { grid-template-columns: 1fr; }
    .url-row { flex-direction: column; }
    .quiz-big-word { font-size: 2rem; }
    #wp-gr { font-size: 1.2rem; }
    #wp-mean-input { font-size: 0.95rem; padding: 10px; }
    .data-sync-panel { flex-direction: column; align-items: flex-start; }
  }
</style>

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

<div class="container">
  
  <header>
    <div class="logo">
      <h1>Yunanca <span>Akıllı</span> Okuyucu</h1>
      <p>Yüksek Performans Motoru & Gelişmiş Test Ünitesi</p>
    </div>
    <div class="main-tabs">
      <button class="main-tab-btn active" id="mtab-read" onclick="switchMainTab('read')">📖 Okuma Paneli</button>
      <button class="main-tab-btn" id="mtab-quiz" onclick="switchMainTab('quiz')">🧠 Test Ünitesi</button>
    </div>
  </header>

  <div class="data-sync-panel">
    <div class="sync-info">
      <strong>💾 Veri Yedekleme & Aktarma</strong>
      <p>Kelime ve destelerinizi başka cihazda kullanmak için dosyayı indirin.</p>
    </div>
    <div class="sync-buttons">
      <button class="sync-btn sync-btn-down" onclick="exportDataToFile()">⬇️ Dosyaya İndir</button>
      <label class="sync-btn sync-btn-up">
        📂 Dosyadan Yükle
        <input type="file" accept=".json" style="display: none;" onchange="importDataFromFile(event)">
      </label>
    </div>
  </div>

  <div id="section-read" style="display: block; animation: fadeIn 0.4s ease;">
    
    <div class="input-section">
      <div class="input-tabs">
        <button class="sub-tab-btn active" onclick="switchInputTab('paste', this)">✏️ Metin Yapıştır</button>
        <button class="sub-tab-btn" onclick="switchInputTab('url', this)">🌐 URL'den Çek</button>
        <button class="sub-tab-btn" onclick="switchInputTab('pdf', this)">📄 PDF Yükle</button>
      </div>

      <div class="input-panel active" id="panel-paste">
        <textarea id="input-text" placeholder="Çalışmak istediğiniz Yunanca metni buraya yapıştırın..."></textarea>
      </div>

      <div class="input-panel" id="panel-url">
        <div class="url-row">
          <input type="text" id="url-input" placeholder="Örn: https://fluencydrop.com/stories/greek/..." />
          <button class="main-btn" onclick="fetchContentFromUrl()">İçeriği Çek</button>
        </div>
        <div id="url-status" style="color:var(--accent2); font-size:0.9rem; font-weight:bold; min-height:20px;"></div>
      </div>

      <div class="input-panel" id="panel-pdf">
        <label class="pdf-label" for="pdf-input">
          <span style="font-size:2rem;">📄</span>
          <span>PDF dosyasını buraya sürükleyin veya bilgisayardan seçin</span>
        </label>
        <input type="file" id="pdf-input" accept=".pdf" onchange="loadPdfFile(this)">
        <div id="pdf-status"></div>
      </div>

      <div class="btn-group">
        <button class="main-btn" onclick="processAndRenderText()">🚀 Metni İşle ve Başla</button>
        <button class="secondary-btn" onclick="clearTextInputs()">Temizle</button>
      </div>
    </div>

    <div id="reader"></div>

    <div id="deck-display"></div>

  </div> 
  
  <div id="section-quiz" id="quiz-section-container" style="display:none;">
    <div class="quiz-card">
      
      <div class="quiz-controls-top">
        <select id="quiz-deck-select"></select>
        <select id="quiz-mode-select">
          <option value="flash">Kart Modu (Flashcard)</option>
          <option value="multi">Çoktan Seçmeli (4 Şık)</option>
          <option value="write">Yazma Testi (Klavye)</option>
        </select>
      </div>

      <button class="main-btn" style="margin: 0 auto 20px auto;" onclick="initializeQuiz()">Testi Başlat / Yenile</button>

      <div id="quiz-work-area">
        <h3 style="color:var(--text-dim); font-weight:400; font-size:1.1rem;">Deste ve mod seçip "Testi Başlat" butonuna tıklayın.</h3>
      </div>

      <div id="quiz-feedback"></div>

      <button id="quiz-next-btn" class="main-btn" style="margin: 20px auto 0 auto; display:none; width: 100%; max-width:400px; justify-content:center;" onclick="loadNextQuizQuestion()">Sıradaki Kelime ➔</button>

    </div>
  </div> 
</div> 

<div id="wpop">
  <div class="wpop-header">
    <h2 id="wp-gr"></h2>
    <button class="close-pop-btn" onclick="closePopup()">✕</button>
  </div>
  
  <input type="text" id="wp-mean-input" placeholder="Anlamı aranıyor...">
  
  <div id="wp-context-box"></div>

  <div class="deck-tools">
    <div class="deck-tools-row">
      <label>Hangi Desteye Eklensin?</label>
      <button onclick="createNewDeck()">+ Yeni Deste</button>
    </div>
    <select id="wp-deck-select"></select>
  </div>

  <div class="action-buttons">
    <button class="action-btn-primary" onclick="saveWordToDeck()">DESTEYE EKLE</button>
    <button class="action-btn-success" onclick="saveWordToCustomDict()" title="Kalıcı Sözlüğe Ekle/Düzelt">💾</button>
    <button class="action-btn-secondary" onclick="toggleHighlightWord()" title="Metin içinde vurgula">🖊</button>
  </div>
</div>

<div id="toast"></div>

<script>
/**
 * 1. VERİ TABANI VE SÖZLÜK MİMARİSİ
 */

const HUGE_RAW_DICTIONARY = [
  ["ανθρώπων", "insanların"],
  ["αβαείο", "manastır"],
  ["αβαείου", "manastırın"],
  ["αβαία", "manastırlar"],
  ["αβαίων", "manastırların"],
  ["άβαχας", "abaküs"],
  ["άβαχα", "abaküsü"],
  ["άβαχας", "abaküsün"],
  ["άβαχα", "abaküs!"],
  ["άβαχες", "abaküsler"],
  ["άβαχες", "abaküsleri"],
  ["άβαχών", "abaküslerin"],
  ["άβαχες", "abaküsler!"]
];

const MASTER_DICT_MAP = new Map(HUGE_RAW_DICTIONARY);

let userCustomDict = new Map(Object.entries(JSON.parse(localStorage.getItem('yunanca_custom_dict_v12')) || {}));
let userDecks = JSON.parse(localStorage.getItem('yunanca_decks_v12')) || { "Genel Kelimeler": [] };

let lastActiveDeck = localStorage.getItem('last_active_deck_v12') || "Genel Kelimeler";
let activeWordString = "";
let activeTokenElement = null;


/**
 * YENİ: VERİ DOSYASI İNDİRME VE YÜKLEME SİSTEMİ
 */
function exportDataToFile() {
  const dataToSave = {
    decks: userDecks,
    customDict: Array.from(userCustomDict.entries()),
    lastDeck: lastActiveDeck
  };
  
  const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement('a');
  a.href = url;
  a.download = "yunanca_verilerim.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  showToastMessage("✅ Veriler dosyaya başarıyla indirildi!");
}

function importDataFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const importedData = JSON.parse(e.target.result);
      
      if (importedData.decks) {
        userDecks = importedData.decks;
        saveDecksToLocalStorage();
      }
      
      if (importedData.customDict) {
        userCustomDict = new Map(importedData.customDict);
        localStorage.setItem('yunanca_custom_dict_v12', JSON.stringify(Object.fromEntries(userCustomDict)));
      }
      
      if (importedData.lastDeck) {
        lastActiveDeck = importedData.lastDeck;
        localStorage.setItem('last_active_deck_v12', lastActiveDeck);
      }
      
      renderDecksAccordion();
      populateDeckSelects();
      showToastMessage("📂 Veriler dosyadan başarıyla yüklendi!");
      event.target.value = ""; // Inputu sıfırla
    } catch (err) {
      showToastMessage("❌ Dosya okuma hatası. Lütfen geçerli bir yedek dosyası seçin.");
      console.error(err);
    }
  };
  reader.readAsText(file);
}


/**
 * 2. SEKME VE ARAYÜZ KONTROLLERİ
 */
function switchMainTab(tabName) {
  document.getElementById('section-read').style.display = tabName === 'read' ? 'block' : 'none';
  document.getElementById('section-quiz').style.display = tabName === 'quiz' ? 'block' : 'none';
  
  document.getElementById('mtab-read').classList.toggle('active', tabName === 'read');
  document.getElementById('mtab-quiz').classList.toggle('active', tabName === 'quiz');

  if(tabName === 'quiz') {
    populateDeckSelects();
  }
}

function switchInputTab(tabName, btnElement) {
  document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
  btnElement.classList.add('active');

  document.querySelectorAll('.input-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tabName).classList.add('active');
}

function showToastMessage(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.display = "block";
  setTimeout(() => toast.style.display="none", 3000);
}


/**
 * 3. VERİ ÇEKME FONKSİYONLARI (URL & PDF)
 */
async function fetchContentFromUrl() {
  const url = document.getElementById('url-input').value.trim();
  const statusDiv = document.getElementById('url-status');
  if (!url) { showToastMessage("Lütfen geçerli bir URL girin."); return; }
  
  statusDiv.textContent = "⏳ İnternetten veri çekiliyor, lütfen bekleyin...";
  
  try {
    const res = await fetch(`https://r.jina.ai/${url}`, {
      headers: { 'Accept': 'text/plain', 'X-Return-Format': 'text' }
    });
    
    if (!res.ok) throw new Error("HTTP " + res.status);
    let raw = await res.text();

    raw = raw.replace(/^(Title|URL|Published Time|Description|Source URL):.*$/gm, '');
    raw = raw.replace(/Proficiency \(C\d\)/gi, '');
    raw = raw.replace(/\d+\s*min read/gi, '');
    raw = raw.replace(/You are reading the free text version\.?/gi, '');
    raw = raw.replace(/Get our mobile app for audio narration, speaking 📖\.\.\./gi, '');
    raw = raw.replace(/Get our mobile app for audio narration, speaking 📖/gi, '');

    let lines = raw.split('\n').map(l => l.trim());

    const skipPatterns = [
      /\[.*?\]\(.*?\)/,           
      /^!\[/,                      
      /^\s*[*#>-]\s/,              
      /^.{0,15}$/,                 
      /^\d{1,2}[.:]\d{2}/,         
      /^[A-Z\s]{2,30}$/,           
      /Σύνταξη|Ακολουθήστε|Δείτε όλες|Tags|Similar|Headlines|Spotlight|inStream|inWellness|inTown|WIDGET|Vita\.gr|Life Scene/i
    ];

    lines = lines.filter(line => {
      if (!line) return false;
      for (const p of skipPatterns) if (p.test(line)) return false;
      return true;
    });

    let result = lines.join('\n').replace(/\n{3,}/g, '\n\n').trim();

    if (!result) throw new Error("Sayfada okunabilir metin bulunamadı.");

    document.getElementById('input-text').value = result;
    switchInputTab('paste', document.querySelector('.sub-tab-btn'));
    statusDiv.textContent = "";
    showToastMessage("✅ Web sayfasından metin başarıyla çekildi!");

  } catch(e) {
    statusDiv.textContent = "❌ Hata: Sayfa çekilemedi veya site engelliyor.";
    console.error(e);
  }
}

async function loadPdfFile(inputElement) {
  const file = inputElement.files[0];
  if (!file) return;
  const statusDiv = document.getElementById('pdf-status');
  statusDiv.textContent = "⏳ PDF analiz ediliyor...";
  
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = "";
    
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const textContent = await page.getTextContent();
      const pageText = textContent.items.map(item => item.str).join(' ');
      fullText += pageText + "\n\n";
    }
    
    fullText = fullText.trim();
    document.getElementById('input-text').value = fullText;
    switchInputTab('paste', document.querySelector('.sub-tab-btn'));
    statusDiv.textContent = "";
    showToastMessage(`✅ PDF Başarıyla Okundu (${pdf.numPages} Sayfa)`);
  } catch(e) {
    statusDiv.textContent = "❌ PDF okunamadı. Lütfen geçerli bir dosya seçin.";
  }
}

function clearTextInputs() {
  document.getElementById('input-text').value = "";
  document.getElementById('reader').innerHTML = "";
  document.getElementById('reader').style.display = "none";
}


/**
 * 4. ÇEVİRİ MOTORU VE AKILLI FİLTRE
 */
async function getSmartTranslation(word, contextSentence = "") {
  const cleanWord = word.toLowerCase().replace(/[.,!?;():"“”]/g, "").trim();

  if (userCustomDict.has(cleanWord)) return userCustomDict.get(cleanWord);
  if (MASTER_DICT_MAP.has(cleanWord)) return MASTER_DICT_MAP.get(cleanWord);

  try {
    const singleUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=el&tl=tr&dt=t&q=${encodeURIComponent(cleanWord)}`;
    const singleResponse = await fetch(singleUrl);
    const singleData = await singleResponse.json();
    let googleSingleTranslation = singleData[0][0][0].toLowerCase().trim();

    if (contextSentence && contextSentence.length > cleanWord.length) {
      const ctxUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=el&tl=tr&dt=t&q=${encodeURIComponent(contextSentence)}`;
      const ctxResponse = await fetch(ctxUrl);
      const ctxData = await ctxResponse.json();
      
      if (ctxData[0]) {
        for (const part of ctxData[0]) {
          if (part[1] && part[1].toLowerCase().includes(cleanWord)) {
            let translatedChunk = part[0].toLowerCase().trim();
            if (translatedChunk.split(' ').length > 2) {
              return googleSingleTranslation;
            }
            return translatedChunk.replace(/[.,!?;()]/g, "");
          }
        }
      }
    }
    return googleSingleTranslation;
  } catch (error) {
    return "Çeviri hatası";
  }
}


/**
 * 5. METNİ İŞLEME VE OKUYUCU HAZIRLAMA
 */
function processAndRenderText() {
  const rawText = document.getElementById('input-text').value;
  if(!rawText.trim()) { showToastMessage("Lütfen işlenecek bir metin girin."); return; }

  const readerDiv = document.getElementById('reader');
  readerDiv.innerHTML = "";
  readerDiv.style.display = "block";

  const lines = rawText.split('\n');
  
  lines.forEach(line => {
    if (!line.trim()) {
      readerDiv.appendChild(document.createElement('br'));
      return;
    }
    
    const pContainer = document.createElement('div');
    pContainer.style.marginBottom = "15px";

    const tokens = line.split(/(\s+)/);
    
    tokens.forEach(token => {
      if (/[\u0370-\u03FF]/.test(token)) {
        const span = document.createElement('span');
        span.className = 'tok';
        span.textContent = token;
        span.onclick = (e) => triggerWordPopup(e, token, line);
        pContainer.appendChild(span);
      } else {
        pContainer.appendChild(document.createTextNode(token));
      }
    });
    
    readerDiv.appendChild(pContainer);
  });

  renderDecksAccordion();
  window.scrollTo({ top: readerDiv.offsetTop - 30, behavior: 'smooth' });
}


/**
 * 6. POPUP (KELİME KARTI) YÖNETİMİ
 */
async function triggerWordPopup(event, word, contextSentence) {
  activeTokenElement = event.target;
  activeWordString = word;
  
  const popup = document.getElementById('wpop');
  const titleGr = document.getElementById('wp-gr');
  const meanInput = document.getElementById('wp-mean-input');
  const contextBox = document.getElementById('wp-context-box');

  titleGr.textContent = word;
  
  let displayContext = contextSentence.trim();
  if (displayContext.length > 80) {
    const wIdx = displayContext.indexOf(word);
    if (wIdx > -1) {
      let start = Math.max(0, wIdx - 35);
      let end = Math.min(displayContext.length, wIdx + word.length + 40);
      displayContext = (start > 0 ? "... " : "") + displayContext.substring(start, end).trim() + (end < displayContext.length ? " ..." : "");
    } else {
      displayContext = displayContext.substring(0, 80) + "...";
    }
  }
  contextBox.textContent = `"${displayContext}"`;
  
  popup.style.display = "block";
  populateDeckSelects();
  
  meanInput.value = "Çeviri aranıyor...";
  
  const finalTranslation = await getSmartTranslation(word, contextSentence);
  meanInput.value = finalTranslation;
}

function closePopup() {
  document.getElementById('wpop').style.display = "none";
}

function toggleHighlightWord() {
  if (activeTokenElement) {
    activeTokenElement.classList.toggle('highlighted');
    showToastMessage("Kelime vurgusu değiştirildi.");
  }
}


/**
 * 7. DESTE VE SÖZLÜK KAYIT İŞLEMLERİ
 */
function populateDeckSelects() {
  const optionsHtml = Object.keys(userDecks).map(deckName => 
    `<option value="${deckName}" ${deckName === lastActiveDeck ? 'selected' : ''}>${deckName} (${userDecks[deckName].length} kelime)</option>`
  ).join('');
  
  const popSelect = document.getElementById('wp-deck-select');
  if(popSelect) popSelect.innerHTML = optionsHtml;
  
  const quizSelect = document.getElementById('quiz-deck-select');
  if(quizSelect) quizSelect.innerHTML = optionsHtml;
}

function createNewDeck() {
  const newName = prompt("Yeni deste adı girin:");
  if (newName && newName.trim()) {
    const cleanName = newName.trim();
    if (!userDecks[cleanName]) {
      userDecks[cleanName] = [];
      lastActiveDeck = cleanName;
      saveDecksToLocalStorage();
      populateDeckSelects();
      renderDecksAccordion();
      showToastMessage(`"${cleanName}" destesi oluşturuldu.`);
    } else {
      showToastMessage("Bu isimde bir deste zaten var!");
    }
  }
}

function saveWordToDeck() {
  const grWord = document.getElementById('wp-gr').textContent.trim();
  const trMean = document.getElementById('wp-mean-input').value.trim();
  const targetDeck = document.getElementById('wp-deck-select').value;
  
  if (!trMean || trMean === "Çeviri aranıyor...") {
    showToastMessage("Lütfen geçerli bir anlam girin.");
    return;
  }

  if (userDecks[targetDeck].some(item => item.gr === grWord)) {
    showToastMessage("Bu kelime destede zaten mevcut!");
  } else {
    userDecks[targetDeck].push({ gr: grWord, tr: trMean });
    lastActiveDeck = targetDeck;
    
    saveDecksToLocalStorage();
    localStorage.setItem('last_active_deck_v12', lastActiveDeck);
    
    renderDecksAccordion();
    populateDeckSelects();
    
    showToastMessage("📚 Kelime desteye eklendi. (Kalıcı olması için bilgisayara yedeğini almayı unutma!)");
  }
  closePopup();
}

function saveWordToCustomDict() {
  const cleanWord = document.getElementById('wp-gr').textContent.toLowerCase().replace(/[.,!?;():]/g, "").trim();
  const newMean = document.getElementById('wp-mean-input').value.trim();
  
  if(newMean) {
    userCustomDict.set(cleanWord, newMean);
    localStorage.setItem('yunanca_custom_dict_v12', JSON.stringify(Object.fromEntries(userCustomDict)));
    showToastMessage("💾 Sözlüğe geçici olarak işlendi. (Tamamen kaydetmek için Dosyaya İndir seçeneğini kullanın)");
  }
}

function saveDecksToLocalStorage() {
  localStorage.setItem('yunanca_decks_v12', JSON.stringify(userDecks));
}


/**
 * 8. DESTE LİSTESİ (AKORDİYON) ARAYÜZÜ
 */
function renderDecksAccordion() {
  const displayContainer = document.getElementById('deck-display');
  displayContainer.innerHTML = "";
  
  for (let deckName in userDecks) {
    const wordList = userDecks[deckName];
    const safeId = deckName.replace(/[^a-zA-Z0-9]/g, '_');
    
    let wordsHtml = "";
    if (wordList.length === 0) {
      wordsHtml = `<p style="color:var(--text-dim); text-align:center;">Bu destede henüz kelime yok.</p>`;
    } else {
      wordsHtml = wordList.map((item, index) => `
        <div class="word-item">
          <span><b>${item.gr}</b> ${item.tr}</span>
          <button class="del-btn" onclick="deleteWordFromDeck('${deckName}', ${index})" title="Kelimeyi Sil">🗑️</button>
        </div>
      `).join('');
    }

    const deleteDeckBtn = deckName !== "Genel Kelimeler" 
      ? `<button class="del-btn" onclick="event.stopPropagation(); deleteDeckEntirely('${deckName}')" style="margin-right:15px;" title="Desteyi Sil">Desteyi Sil</button>` 
      : ``;

    displayContainer.innerHTML += `
      <div class="deck-section">
        <div class="deck-header" onclick="toggleAccordion('${safeId}')">
          <strong>📂 ${deckName} (${wordList.length} kelime)</strong>
          <div style="display:flex; align-items:center;">
            ${deleteDeckBtn}
            <span class="deck-arrow" id="arrow-${safeId}">▼</span>
          </div>
        </div>
        <div class="deck-content" id="content-${safeId}">
          ${wordsHtml}
        </div>
      </div>
    `;
  }
}

function toggleAccordion(safeId) {
  const content = document.getElementById('content-' + safeId);
  const arrow = document.getElementById('arrow-' + safeId);
  if (content) {
    content.classList.toggle('open');
    arrow.classList.toggle('open');
  }
}

function deleteWordFromDeck(deckName, wordIndex) {
  if (confirm("Bu kelimeyi silmek istediğinize emin misiniz?")) {
    userDecks[deckName].splice(wordIndex, 1);
    saveDecksToLocalStorage();
    renderDecksAccordion();
    populateDeckSelects();
  }
}

function deleteDeckEntirely(deckName) {
  if (confirm(`"${deckName}" destesini ve içindeki tüm kelimeleri silmek istediğinize emin misiniz?`)) {
    delete userDecks[deckName];
    if (lastActiveDeck === deckName) lastActiveDeck = "Genel Kelimeler";
    saveDecksToLocalStorage();
    renderDecksAccordion();
    populateDeckSelects();
  }
}


/**
 * 9. GELİŞMİŞ TEST ÜNİTESİ
 */
let currentQuizQuestion = null;

function initializeQuiz() {
  const deckName = document.getElementById('quiz-deck-select').value;
  const deck = userDecks[deckName];
  
  if (!deck || deck.length === 0) {
    showToastMessage("Seçilen deste boş!");
    document.getElementById('quiz-work-area').innerHTML = `<h3 style="color:var(--error); font-size:1.1rem;">Bu destede çalışılacak kelime yok. Lütfen okuma panelinden kelime ekleyin.</h3>`;
    document.getElementById('quiz-next-btn').style.display = "none";
    document.getElementById('quiz-feedback').innerHTML = "";
    return;
  }

  document.getElementById('quiz-next-btn').style.display = "flex";
  loadNextQuizQuestion();
}

function loadNextQuizQuestion() {
  const deckName = document.getElementById('quiz-deck-select').value;
  const mode = document.getElementById('quiz-mode-select').value;
  const deck = userDecks[deckName];
  
  const workArea = document.getElementById('quiz-work-area');
  const feedback = document.getElementById('quiz-feedback');
  feedback.innerHTML = ""; 

  currentQuizQuestion = deck[Math.floor(Math.random() * deck.length)];

  if (mode === 'flash') {
    workArea.innerHTML = `
      <div class="quiz-big-word">${currentQuizQuestion.gr}</div>
      <div id="flash-answer" style="display:none; font-size:1.8rem; color:var(--accent); font-weight:bold; margin-bottom:15px; animation:fadeIn 0.3s;">${currentQuizQuestion.tr}</div>
      <button class="main-btn" style="padding:15px 30px; font-size:1rem; margin-bottom:15px;" onclick="document.getElementById('flash-answer').style.display='block'">Cevabı Göster</button>
    `;
  } 
  else if (mode === 'multi') {
    let allTranslations = Object.values(userDecks).flat().map(item => item.tr);
    allTranslations = [...new Set(allTranslations)].filter(t => t !== currentQuizQuestion.tr);
    
    let options = [currentQuizQuestion.tr];
    
    while(options.length < 4 && allTranslations.length > 0) {
      const randomIdx = Math.floor(Math.random() * allTranslations.length);
      options.push(allTranslations.splice(randomIdx, 1)[0]);
    }
    
    options.sort(() => Math.random() - 0.5);

    workArea.innerHTML = `
      <div class="quiz-big-word">${currentQuizQuestion.gr}</div>
      <div class="quiz-options-grid">
        ${options.map(opt => `<button class="quiz-opt-btn" onclick="validateMultipleChoice('${opt}')">${opt}</button>`).join('')}
      </div>
    `;
  } 
  else if (mode === 'write') {
    workArea.innerHTML = `
      <div class="quiz-big-word">${currentQuizQuestion.gr}</div>
      <input type="text" id="quiz-write-input" placeholder="Türkçe karşılığını yazın..." onkeydown="if(event.key==='Enter') validateWrittenAnswer()">
      <button class="main-btn" style="width:100%; max-width:400px; justify-content:center; padding:12px;" onclick="validateWrittenAnswer()">Cevabı Kontrol Et</button>
    `;
    setTimeout(() => {
      const inp = document.getElementById('quiz-write-input');
      if(inp) inp.focus();
    }, 100);
  }
}

function validateMultipleChoice(selectedAnswer) {
  const feedback = document.getElementById('quiz-feedback');
  const buttons = document.querySelectorAll('.quiz-opt-btn');
  
  buttons.forEach(btn => btn.disabled = true);

  if (selectedAnswer === currentQuizQuestion.tr) {
    feedback.innerHTML = `<span style="color:var(--success);">✅ Doğru Bildiniz!</span>`;
    setTimeout(loadNextQuizQuestion, 1200);
  } else {
    feedback.innerHTML = `<span style="color:var(--error);">❌ Yanlış! Doğru Cevap: <b style="color:#fff">${currentQuizQuestion.tr}</b></span>`;
  }
}

function validateWrittenAnswer() {
  const userInput = document.getElementById('quiz-write-input').value.trim().toLowerCase();
  const correctAnswer = currentQuizQuestion.tr.trim().toLowerCase();
  const feedback = document.getElementById('quiz-feedback');

  if (userInput === correctAnswer) {
    feedback.innerHTML = `<span style="color:var(--success);">✅ Mükemmel!</span>`;
    document.getElementById('quiz-write-input').style.borderColor = "var(--success)";
    setTimeout(loadNextQuizQuestion, 1200);
  } else {
    feedback.innerHTML = `<span style="color:var(--error);">❌ Yanlış! Doğru Cevap: <b style="color:#fff">${currentQuizQuestion.tr}</b></span>`;
    document.getElementById('quiz-write-input').style.borderColor = "var(--error)";
  }
}

// Başlangıç Kurulum İşlemleri
populateDeckSelects();
renderDecksAccordion();
</script>
